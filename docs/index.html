<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapVina Showcase — SDK Screenshots Gallery</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <meta name="description" content="Screenshots gallery proving MapVina SDK runs successfully on Android, iOS, Flutter and React Native.">
</head>
<body>
  <header>
    <h1>MapVina Showcase</h1>
    <p>Ảnh chụp màn hình chứng minh MapVina SDK chạy thành công trên Android, iOS, Flutter và React Native.</p>
  </header>

  <nav class="filter-bar">
    <button class="filter-btn active" data-filter="all">Tất cả</button>
    <button class="filter-btn" data-filter="android">Android</button>
    <button class="filter-btn" data-filter="ios">iOS</button>
    <button class="filter-btn" data-filter="flutter">Flutter</button>
    <button class="filter-btn" data-filter="react-native">React Native</button>
  </nav>

  <main id="gallery" class="gallery">
    <!-- Rendered by JS -->
  </main>

  <footer>
    <p>MapVina © 2025 — <a href="https://github.com/mapvina/mapvina-showcase" style="color:inherit;">GitHub Repo</a></p>
  </footer>

  <script src="assets/js/gallery.js"></script>
</body>
</html>
